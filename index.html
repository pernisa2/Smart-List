<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />

  <title>Lista Smart</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />

  <!-- iPhone PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">✓</div>
        <div class="titles">
          <h1>Lista Smart</h1>
          <p>Compras & tarefas</p>
        </div>
      </div>
      <button id="clearDoneBtn" class="btn ghost" title="Limpar feitos">Limpar feitos</button>
    </header>

    <main class="content">
      <section class="card">
        <form id="taskForm" class="form" autocomplete="off">
          <div class="field">
            <label for="taskInput">Adicionar</label>
            <input
              id="taskInput"
              type="text"
              placeholder="Ex: Leite, pão, pagar conta..."
              maxlength="80"
              required
            />
          </div>

          <div class="row">
            <div class="field">
              <label for="tagInput">Categoria (opcional)</label>
              <input id="tagInput" type="text" placeholder="Ex: Mercado, Farmácia" maxlength="20" />
            </div>

            <button class="btn primary" type="submit">Adicionar</button>
          </div>
        </form>

        <div class="filters">
          <button class="chip active" data-filter="all">Todas</button>
          <button class="chip" data-filter="open">Pendentes</button>
          <button class="chip" data-filter="done">Feitas</button>
        </div>
      </section>

      <section class="card listCard">
        <div class="listHeader">
          <h2>Itens</h2>
          <span id="counter" class="counter">0</span>
        </div>

        <ul id="taskList" class="list" aria-label="Lista de itens"></ul>

        <div id="emptyState" class="empty">
          <div class="emptyIcon">🧾</div>
          <p>Sem itens ainda. Adicione o primeiro acima 👆</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <small>Instalável no iPhone (PWA) • Salva automaticamente</small>
    </footer>
  </div>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modalCard">
      <h3>Editar item</h3>
      <div class="field">
        <label for="editText">Texto</label>
        <input id="editText" type="text" maxlength="80" />
      </div>
      <div class="field">
        <label for="editTag">Categoria</label>
        <input id="editTag" type="text" maxlength="20" />
      </div>
      <div class="modalActions">
        <button id="cancelEdit" class="btn ghost">Cancelar</button>
        <button id="saveEdit" class="btn primary">Salvar</button>
      </div>
    </div>
    <button class="backdrop" id="closeModal" aria-label="Fechar"></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
